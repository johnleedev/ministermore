<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MM 로그인</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef5ff 0%, #f8fafd 28%, #f8fafd 100%);
      color: #111827;
      min-height: 100%;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px 40px;
    }
    .phone {
      width: 100%;
      max-width: 430px;
      min-height: calc(100vh - 48px);
      position: relative;
    }
    .top-glow {
      position: absolute;
      inset: 0 0 auto 0;
      height: 260px;
      background:
        radial-gradient(circle at 20% 10%, rgba(63, 136, 255, 0.12), transparent 42%),
        radial-gradient(circle at 80% 5%, rgba(40, 182, 255, 0.10), transparent 40%);
      pointer-events: none;
      z-index: 0;
    }
    .screen {
      position: relative;
      z-index: 1;
      padding: 18px 8px 24px;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 8px 10px;
      font-size: 14px;
      font-weight: 700;
      color: #0f172a;
    }
    .status-icons {
      display: flex;
      gap: 6px;
      align-items: center;
      opacity: 0.8;
    }
    .dot, .bar {
      display: inline-block;
      background: #0f172a;
      border-radius: 99px;
    }
    .dot { width: 4px; height: 4px; }
    .bar:nth-child(2) { width: 14px; height: 8px; border: 1.5px solid #0f172a; background: transparent; }
    .bar:nth-child(3) { width: 18px; height: 8px; border: 1.5px solid #0f172a; background: transparent; position: relative; }
    .bar:nth-child(3)::after {
      content: "";
      position: absolute;
      right: -3px;
      top: 1.5px;
      width: 2px;
      height: 3px;
      border-radius: 1px;
      background: #0f172a;
    }
    .hero {
      text-align: center;
      padding: 18px 12px 22px;
    }
    .logo-wrap {
      width: 74px;
      height: 74px;
      margin: 0 auto 16px;
      border-radius: 22px;
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 32px rgba(31, 107, 255, 0.10);
      border: 1px solid rgba(255,255,255,0.8);
    }
    .logo-wrap img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      display: block;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #eaf2ff;
      color: #1f6bff;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: -0.03em;
      color: #111827;
    }
    .subtitle {
      margin: 10px auto 0;
      max-width: 290px;
      font-size: 14px;
      line-height: 1.6;
      color: #6b7280;
      letter-spacing: -0.01em;
    }
    .card {
      background: rgba(255,255,255,0.96);
      border: 1px solid #e6ecf5;
      border-radius: 28px;
      box-shadow: 0 8px 24px rgba(31, 107, 255, 0.08);
      padding: 22px;
      margin: 8px 4px 18px;
    }
    .section-title {
      margin: 0 0 16px;
      font-size: 16px;
      font-weight: 800;
      color: #111827;
      letter-spacing: -0.02em;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .input-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 56px;
      border-radius: 16px;
      border: 1px solid #e6ecf5;
      background: #ffffff;
      padding: 0 16px;
      transition: all 0.2s ease;
    }
    .input-wrap:focus-within {
      border-color: #1f6bff;
      box-shadow: 0 0 0 4px rgba(31, 107, 255, 0.10);
      background: #fcfdff;
    }
    .input-icon {
      width: 20px;
      text-align: center;
      font-size: 16px;
      opacity: 0.78;
      flex: 0 0 20px;
    }
    .input-wrap input {
      border: 0;
      outline: none;
      width: 100%;
      font-size: 15px;
      color: #111827;
      background: transparent;
    }
    .input-wrap input::placeholder {
      color: #9aa3b2;
    }
    .toggle {
      border: 0;
      background: transparent;
      color: #7c8798;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
      flex: 0 0 auto;
    }
    .button {
      width: 100%;
      height: 56px;
      border-radius: 16px;
      border: 0;
      cursor: pointer;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.02em;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    .button:active { transform: translateY(1px); }
    .primary {
      margin-top: 14px;
      background: linear-gradient(180deg, #2b7cff 0%, #1f6bff 100%);
      color: #fff;
      box-shadow: 0 12px 20px rgba(31, 107, 255, 0.22);
    }
    .primary:hover { background: linear-gradient(180deg, #2473f2 0%, #1857d8 100%); }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 700;
    }
    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e8eef7;
    }
    .socials {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: 800;
    }
    .social-icon {
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .social-icon img {
      width: 20px;
      height: 20px;
      object-fit: contain;
      display: block;
      border-radius: 50%;
      border: 1px solid rgba(25, 25, 25, 0.18);
    }
    .kakao {
      background: #fee500;
      color: #191919;
      box-shadow: 0 8px 18px rgba(254, 229, 0, 0.22);
    }
    .apple {
      background: #111111;
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(17, 17, 17, 0.18);
    }
    .links {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      margin-top: 18px;
      font-size: 14px;
      color: #6b7280;
    }
    .links a {
      color: #667085;
      text-decoration: none;
      font-weight: 700;
    }
    .links .sep {
      width: 1px;
      height: 12px;
      background: #d8e0ec;
    }
    .benefits {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 14px 4px 18px;
    }
    .benefit {
      background: rgba(255,255,255,0.9);
      border: 1px solid #e6ecf5;
      border-radius: 18px;
      padding: 14px 10px;
      text-align: center;
      box-shadow: 0 4px 14px rgba(17, 24, 39, 0.03);
    }
    .benefit .emoji {
      display: block;
      font-size: 18px;
      margin-bottom: 6px;
    }
    .benefit strong {
      display: block;
      font-size: 13px;
      color: #1f2937;
      margin-bottom: 3px;
      letter-spacing: -0.02em;
    }
    .benefit span {
      font-size: 11px;
      line-height: 1.45;
      color: #7a8597;
    }
    .footer-note {
      text-align: center;
      font-size: 12px;
      line-height: 1.6;
      color: #98a2b3;
      padding: 0 18px;
    }
    @media (max-width: 360px) {
      .card { padding: 18px; }
      h1 { font-size: 28px; }
      .benefits { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="top-glow"></div>
    <div class="screen">
      <div class="status-bar">
        <div>9:41</div>
        <div class="status-icons" aria-hidden="true">
          <span class="dot"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </div>
      </div>

      <section class="hero">
        <div class="logo-wrap">
          <img src="https://www.genspark.ai/api/files/s/ReP5LC2G" alt="MM 로고" />
        </div>
        <div class="badge">MM 회원 서비스</div>
        <h1>로그인</h1>
        <p class="subtitle">더 많은 공고와 게시판 기능을 편하게 이용해보세요</p>
      </section>

      <section class="card">
        <h2 class="section-title">계정으로 로그인</h2>

        <div class="input-group">
          <label class="input-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" placeholder="이메일 주소" />
          </label>

          <label class="input-wrap">
            <span class="input-icon">🔒</span>
            <input id="passwordField" type="password" placeholder="비밀번호" />
            <button type="button" class="toggle" onclick="togglePassword()">보기</button>
          </label>
        </div>

        <button class="button primary" type="button">이메일로 로그인</button>

        <div class="divider">또는</div>

        <div class="socials">
          <button class="button social kakao" type="button">
            <span class="social-icon"><img src="images/login/kakao.png" alt="" /></span>
            <span>카카오로 계속하기</span>
          </button>
          <button class="button social apple" type="button">
            <span class="social-icon"></span>
            <span>Apple로 계속하기</span>
          </button>
        </div>

        <div class="links">
          <a href="#">회원가입</a>
          <span class="sep"></span>
          <a href="#">비밀번호 찾기</a>
        </div>
      </section>

      <section class="benefits" aria-label="로그인 혜택">
        <div class="benefit">
          <span class="emoji">📌</span>
          <strong>관심 공고 저장</strong>
          <span>원하는 채용공고를 빠르게 모아보세요</span>
        </div>
        <div class="benefit">
          <span class="emoji">💬</span>
          <strong>게시판 참여</strong>
          <span>글 작성과 소통 기능을 이용해보세요</span>
        </div>
        <div class="benefit">
          <span class="emoji">🎵</span>
          <strong>사역 기능 확장</strong>
          <span>예배사역과 수련회 정보를 편하게 확인하세요</span>
        </div>
      </section>

      <p class="footer-note">이용약관 및 개인정보처리방침에 동의하고 로그인합니다</p>
    </div>
  </div>

  <script>
    function togglePassword() {
      const field = document.getElementById('passwordField');
      const button = document.querySelector('.toggle');
      const isPassword = field.type === 'password';
      field.type = isPassword ? 'text' : 'password';
      button.textContent = isPassword ? '숨기기' : '보기';
    }
  </script>

</body>
</html>
